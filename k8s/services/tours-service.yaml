apiVersion: apps/v1
kind: Deployment
metadata:
  name: tours-service
  namespace: tourism
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tours-service
  template:
    metadata:
      labels:
        app: tours-service
    spec:
      containers:
        - name: tours-service
          image: tourism/tours-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: tourism-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: tours-service
  namespace: tourism
spec:
  selector:
    app: tours-service
  ports:
    - port: 8000
      targetPort: 8000
