<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
  <style>
    .ext{fill:#f0f0f0;stroke:#7a7a7a;stroke-width:1.5;}
    .svc{fill:#eef4fb;stroke:#2f6fb0;stroke-width:1.5;}
    .data{fill:#f3eefb;stroke:#7a4fb0;stroke-width:1.5;}
    .ctl{fill:#eef9f0;stroke:#3a9d5d;stroke-width:1.5;}
    .lbl{font-size:13px;fill:#1c2733;font-weight:bold;}
    .sub{font-size:10px;fill:#54606b;}
    .edge{stroke:#444;stroke-width:1.5;fill:none;}
    .etxt{font-size:10px;fill:#33424f;}
    .nsbox{fill:none;stroke:#2f6fb0;stroke-width:1.3;stroke-dasharray:6 4;}
    .nslbl{font-size:12px;fill:#2f6fb0;font-style:italic;}
  </style>

  <!-- Cliente / Ingress (externos) -->
  <rect class="ext" x="330" y="20" width="160" height="42" rx="8"/>
  <text x="410" y="46" text-anchor="middle" class="lbl">Cliente / Empresa</text>
  <rect class="ext" x="330" y="82" width="160" height="42" rx="8"/>
  <text x="410" y="108" text-anchor="middle" class="lbl">Ingress NGINX</text>

  <!-- Caja del namespace (malla + políticas) -->
  <rect class="nsbox" x="40" y="142" width="740" height="430" rx="10"/>
  <text x="56" y="164" class="nslbl">namespace tourism — malla Linkerd (mTLS) + NetworkPolicies de mínimo privilegio</text>

  <!-- api-gateway -->
  <rect class="svc" x="330" y="180" width="160" height="50" rx="8"/>
  <text x="410" y="200" text-anchor="middle" class="lbl">api-gateway</text>
  <text x="410" y="216" text-anchor="middle" class="sub">valida API Key · enruta</text>

  <!-- KEDA (control) -->
  <rect class="ctl" x="600" y="182" width="150" height="46" rx="8"/>
  <text x="675" y="203" text-anchor="middle" class="lbl">KEDA</text>
  <text x="675" y="218" text-anchor="middle" class="sub">autoescala el gateway</text>

  <!-- Servicios -->
  <rect class="svc" x="70"  y="300" width="160" height="46" rx="8"/>
  <text x="150" y="328" text-anchor="middle" class="lbl">auth-service</text>
  <rect class="svc" x="330" y="300" width="160" height="46" rx="8"/>
  <text x="410" y="328" text-anchor="middle" class="lbl">tours-service</text>
  <rect class="svc" x="570" y="300" width="170" height="46" rx="8"/>
  <text x="655" y="328" text-anchor="middle" class="lbl">bookings-service</text>

  <!-- Datos -->
  <rect class="data" x="230" y="430" width="170" height="46" rx="8"/>
  <text x="315" y="458" text-anchor="middle" class="lbl">PostgreSQL</text>
  <rect class="data" x="470" y="430" width="130" height="46" rx="8"/>
  <text x="535" y="458" text-anchor="middle" class="lbl">Redis</text>

  <!-- Aristas externas -->
  <path class="edge" d="M410,62 L410,82" marker-end="url(#ar)"/>
  <path class="edge" d="M410,124 L410,180" marker-end="url(#ar)"/>

  <!-- KEDA -> gateway -->
  <path class="edge" d="M600,205 L490,205" marker-end="url(#ar)"/>

  <!-- gateway -> servicios -->
  <path class="edge" d="M360,230 L160,300" marker-end="url(#ar)"/>
  <path class="edge" d="M410,230 L410,300" marker-end="url(#ar)"/>
  <path class="edge" d="M460,230 L650,300" marker-end="url(#ar)"/>

  <!-- bookings -> tours -->
  <path class="edge" d="M570,323 L492,323" marker-end="url(#ar)"/>

  <!-- servicios -> datos -->
  <path class="edge" d="M165,346 L280,430" marker-end="url(#ar)"/>      <!-- auth -> pg -->
  <path class="edge" d="M395,346 L335,430" marker-end="url(#ar)"/>      <!-- tours -> pg -->
  <path class="edge" d="M445,346 L520,430" marker-end="url(#ar)"/>      <!-- tours -> redis -->
  <path class="edge" d="M640,346 L380,432" marker-end="url(#ar)"/>      <!-- bookings -> pg -->
</svg>
